apiVersion: apps/v1
kind: Deployment
metadata:
  name: trademind-backend
  labels:
    app: trademind-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: trademind-backend
  template:
    metadata:
      labels:
        app: trademind-backend
    spec:
      containers:
        - name: backend
          image: your-registry/trademind-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: trademind-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trademind-backend-svc
spec:
  selector:
    app: trademind-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: trademind-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trademind-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
