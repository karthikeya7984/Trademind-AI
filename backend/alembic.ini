[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is intentionally left as a placeholder.
# The actual DATABASE_URL is always loaded from the .env file
# via app/core/config.py and injected in alembic/env.py.
# Do NOT hardcode credentials here.
sqlalchemy.url = postgresql://placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
